<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TSF Alex SMP</title>

<!-- Minecraft Web Font -->
<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>
:root {
    --server-ip: "tsfalex.feathermc.gg";
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    font-family: 'Minecraft', sans-serif !important;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    scroll-behavior: smooth;
}

/* Loading Screen */
#loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: #0f2027;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    flex-direction: column;
}

.loader-bar {
    width: 300px;
    height: 10px;
    background: #222;
    margin-top: 20px;
    overflow: hidden;
}

.loader-fill {
    width: 0%;
    height: 100%;
    background: #00ff88;
    animation: load 2s forwards;
}

@keyframes load {
    to { width: 100%; }
}

/* Hero Section */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

.hero h1 {
    font-size: 3rem;
    margin-bottom: 20px;
}

.ip-box {
    background: rgba(0,0,0,0.4);
    padding: 15px 30px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
}

.ip-box:hover {
    background: rgba(0,0,0,0.7);
}

/* Stats Section */
.stats {
    display: flex;
    justify-content: center;
    gap: 50px;
    padding: 100px 20px;
    text-align: center;
}

.stat h2 {
    font-size: 3rem;
    color: #00ff88;
}

.stat p {
    margin-top: 10px;
}

footer {
    text-align: center;
    padding: 30px;
    background: rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<!-- Loading Screen -->
<div id="loader">
    <h2>Loading Server...</h2>
    <div class="loader-bar">
        <div class="loader-fill"></div>
    </div>
</div>

<!-- Main Content -->
<section class="hero">
    <h1>TSF Alex SMP</h1>

    <div class="ip-box" onclick="copyIP()">
        Click to Copy IP<br>
        <strong id="serverIP">tsfalex.feathermc.gg</strong>
        <br><br>
        Available on Java & Bedrock
    </div>
</section>

<section class="stats">
    <div class="stat">
        <h2 class="counter" data-target="500">0</h2>
        <p>Total Players Joined</p>
    </div>
    <div class="stat">
        <h2 class="counter" data-target="1200">0</h2>
        <p>Discord Members</p>
    </div>
    <div class="stat">
        <h2 class="counter" data-target="24">0</h2>
        <p>Hours Online Daily</p>
    </div>
</section>

<footer>
    © 2026 TSF Alex SMP — All Rights Reserved
</footer>

<script>
// Loading Screen
window.addEventListener("load", () => {
    setTimeout(() => {
        document.getElementById("loader").style.display = "none";
    }, 2000);
});

// Copy IP
function copyIP() {
    const ip = document.getElementById("serverIP").innerText;
    navigator.clipboard.writeText(ip);
    alert("Server IP Copied!");
}

// Animated Counter
const counters = document.querySelectorAll('.counter');

counters.forEach(counter => {
    const updateCount = () => {
        const target = +counter.getAttribute('data-target');
        const count = +counter.innerText;
        const increment = target / 200;

        if (count < target) {
            counter.innerText = Math.ceil(count + increment);
            setTimeout(updateCount, 10);
        } else {
            counter.innerText = target;
        }
    };
    updateCount();
});
</script>

</body>
</html>
